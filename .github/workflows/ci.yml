# CI — docs/18 §4. 신뢰 원천: windows job(실행 타깃), core job(크로스 플랫폼 순수부).
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  core:
    name: core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show # rust-toolchain.toml 적용
      - run: cargo test --workspace

  windows:
    name: windows (build·test·예산)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: cargo test --workspace
      - run: cargo build --release -p nexa-app
      - name: 예산 B2 — 단일 exe ≤ 10MB (docs/18 §5)
        shell: pwsh
        run: |
          $exe = "target/release/nexa-app.exe"
          $mb = [math]::Round((Get-Item $exe).Length / 1MB, 2)
          Write-Output "nexa-app.exe = $mb MB"
          if ((Get-Item $exe).Length -gt 10MB) { throw "예산 B2 초과: $mb MB > 10 MB" }
      - name: 예산 B3 — 임포트 DLL 화이트리스트 게이트 (docs/18 §5)
        shell: pwsh
        run: |
          # OS 인박스 DLL 화이트리스트(M0-8 실측 + ADR-0002 DirectWrite) — 외 DLL 발견 시 fail
          $whitelist = @("kernel32.dll", "user32.dll", "gdi32.dll", "ntdll.dll", "oleaut32.dll", "dwrite.dll", "combase.dll")
          $dumpbin = Get-ChildItem "C:\Program Files*\Microsoft Visual Studio" -Recurse -Filter dumpbin.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $dumpbin) { throw "dumpbin 미발견 — B3 게이트 실행 불가" }
          $imports = & $dumpbin.FullName /imports target/release/nexa-app.exe |
            Select-String '^\s+(\S+\.dll)\s*$' | ForEach-Object { $_.Matches[0].Groups[1].Value.ToLower() } | Sort-Object -Unique
          Write-Output "임포트: $($imports -join ', ')"
          $violations = $imports | Where-Object { $_ -notin $whitelist -and $_ -notlike "api-ms-win-*" }
          if ($violations) { throw "예산 B3 위반(OS 인박스 외): $($violations -join ', ')" }
      - uses: actions/upload-artifact@v4
        with:
          name: nexa-app-win-x64
          path: target/release/nexa-app.exe

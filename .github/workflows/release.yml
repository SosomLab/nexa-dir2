# Release — docs/18 §5 (M5-2). 버전 태그 push → 게이트(test·B2·B3) 통과 시
# 포터블 단일 exe(DR-3)를 GitHub Release에 자동 첨부. 태그 규약 = `0.5.0`(v 접두사 허용).
name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: # 수동 실행 = 게이트+아티팩트만(Release 생성은 태그 push에서만)

permissions:
  contents: write # Release 생성·자산 업로드

jobs:
  release:
    name: windows (게이트 → Release 첨부)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show # rust-toolchain.toml 적용
      - run: cargo test --workspace
      - run: cargo build --release -p nexa-app
      - name: 예산 B2 — 단일 exe ≤ 10MB (docs/18 §6)
        shell: pwsh
        run: |
          $exe = "target/release/nexa-app.exe"
          $mb = [math]::Round((Get-Item $exe).Length / 1MB, 2)
          Write-Output "nexa-app.exe = $mb MB"
          if ((Get-Item $exe).Length -gt 10MB) { throw "예산 B2 초과: $mb MB > 10 MB" }
      - name: 예산 B3 — 임포트 DLL 화이트리스트 게이트 (docs/18 §6)
        shell: pwsh
        run: pwsh scripts/budget-b3.ps1
      - name: 배포 산출물 이름 — NexaDir2-<버전>-win-x64.exe (포터블 단일 exe, DR-3)
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          if ("${{ github.ref_type }}" -ne "tag") { $ver = "dev" }
          Copy-Item target/release/nexa-app.exe "NexaDir2-$ver-win-x64.exe"
          Write-Output "산출물: NexaDir2-$ver-win-x64.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: NexaDir2-win-x64
          path: NexaDir2-*-win-x64.exe
      - name: GitHub Release 생성·exe 첨부 (태그 push에서만)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: NexaDir2-*-win-x64.exe
          generate_release_notes: true

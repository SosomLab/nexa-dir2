# Release — docs/18 §5 (M5-2). 버전 태그 push → 게이트(test·B2·B3) 통과 시
# 포터블 단일 exe(DR-3)를 GitHub Release에 자동 첨부. 태그 규약 = `0.5.0`(v 접두사 허용).
name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: # 수동 실행 = 게이트+아티팩트만(Release 생성은 태그 push에서만)

permissions:
  contents: write # Release 생성·자산 업로드

jobs:
  release:
    name: windows (게이트 → Release 첨부)
    runs-on: windows-latest
    env:
      # 시크릿 미설정 시 빈 문자열 → choco push 단계는 건너뛴다(패킹까지만 수행).
      CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show # rust-toolchain.toml 적용
      - run: cargo test --workspace
      - run: cargo build --release -p nexa-app
      - name: 예산 B2 — 단일 exe ≤ 10MB (docs/18 §6)
        shell: pwsh
        run: |
          $exe = "target/release/nexa-app.exe"
          $mb = [math]::Round((Get-Item $exe).Length / 1MB, 2)
          Write-Output "nexa-app.exe = $mb MB"
          if ((Get-Item $exe).Length -gt 10MB) { throw "예산 B2 초과: $mb MB > 10 MB" }
      - name: 예산 B3 — 임포트 DLL 화이트리스트 게이트 (docs/18 §6)
        shell: pwsh
        run: pwsh scripts/budget-b3.ps1
      - name: 배포 산출물 이름 — NexaDir-<버전>-win-x64.exe (포터블 단일 exe, DR-3)
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          if ("${{ github.ref_type }}" -ne "tag") { $ver = "dev" }
          Copy-Item target/release/nexa-app.exe "NexaDir-$ver-win-x64.exe"
          Write-Output "산출물: NexaDir-$ver-win-x64.exe"
      - name: 설치형 exe 빌드 — Inno Setup (보조 채널, DR-3 개정 07-16)
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          if ("${{ github.ref_type }}" -ne "tag") { $ver = "0.0.0" }
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=$ver /DExePath="$PWD\target\release\nexa-app.exe" installer\nexa.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC 실패: $LASTEXITCODE" }
          Get-Item installer\out\NexaDir-Setup-*.exe | ForEach-Object {
            Write-Output "설치형: $($_.Name) = $([math]::Round($_.Length / 1MB, 2)) MB"
          }
      - name: Chocolatey nupkg 팩 — 버전·체크섬 주입 (3채널, docs/21 §7)
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          $setup = Get-Item installer\out\NexaDir-Setup-$ver.exe
          $sha = (Get-FileHash -Algorithm SHA256 $setup).Hash.ToLower()
          Write-Output "설치형 SHA-256 = $sha"
          # nupkg는 바이너리 미동봉 — 설치 시 이 Release 자산을 내려받는다.
          $ps1 = "packaging\chocolatey\tools\chocolateyinstall.ps1"
          (Get-Content $ps1 -Raw).Replace("{{VERSION}}", $ver).Replace("{{CHECKSUM64}}", $sha) |
            Set-Content $ps1 -NoNewline
          choco pack packaging\chocolatey\nexa-dir.nuspec --version $ver --outputdirectory packaging\chocolatey\out
          if ($LASTEXITCODE -ne 0) { throw "choco pack 실패: $LASTEXITCODE" }
          Get-Item packaging\chocolatey\out\*.nupkg | ForEach-Object { Write-Output "nupkg: $($_.Name)" }

      - name: Chocolatey 커뮤니티 저장소 push (CHOCO_API_KEY 시크릿 있을 때만)
        if: github.ref_type == 'tag' && env.CHOCO_API_KEY != ''
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          choco push packaging\chocolatey\out\nexa-dir.$ver.nupkg `
            --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY
          if ($LASTEXITCODE -ne 0) { throw "choco push 실패: $LASTEXITCODE" }

      - uses: actions/upload-artifact@v4
        with:
          name: NexaDir-win-x64
          path: |
            NexaDir-*-win-x64.exe
            installer/out/NexaDir-Setup-*.exe
            packaging/chocolatey/out/*.nupkg
      - name: GitHub Release 생성·포터블+설치형 첨부 (태그 push에서만)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            NexaDir-*-win-x64.exe
            installer/out/NexaDir-Setup-*.exe
          generate_release_notes: true
